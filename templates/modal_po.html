            <div class="modal-overlay" id="modalOverlay">
                <div class="modal-box">
                    <div class="modal-header">
                        <h3><i class="fa-solid fa-pen-to-square"></i> Edit PO Stock</h3>
                        <button class="modal-close" id="modalClose">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label>Nomor PO</label>
                            <input type="text" id="modalPoNumber" class="form-input" readonly>

                            <label>Qty PO (KG)</label>
                            <input type="number" id="modalPoQty" class="form-input" placeholder="Masukkan jumlah PO..."

                            <textarea id="modalPoKeterangan" class="form-input" rows="3" placeholder="Catatan atau keterangan PO..." style="resize:vertical; font-family:inherit;"></textarea>

                    </div>

                        <button class="btn-cancel" id="modalCancelBtn">Batal</button>

                    </div>
                </div>
